<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>双色球查询工具</title>
    <!-- Google Fonts: 思源幼黑体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #e0e5ec 0%, #c9d1de 100%);
            min-height: 100vh;
        }
        
        /* ════════════════════════════════════════════════════════
           Pure Neumorphism Style (新拟态)
        ════════════════════════════════════════════════════════ */
        
        :root {
            --bg-light: #e0e5ec;
            --bg-dark: #c9d1de;
            --text-primary: #4a5568;
            --text-secondary: #718096;
            --accent-red: #dc3545;
            --accent-blue: #007bff;
            --shadow-light: rgba(255, 255, 255, 0.9);
            --shadow-dark: #bebcc6;
            --glow-red: rgba(220, 53, 69, 0.6);
            --glow-blue: rgba(0, 123, 255, 0.6);
            --glow-gold: rgba(251, 191, 36, 0.8);
        }
        
        /* ════════════════════════════════════════════════════════
           柔和背景动画
        ════════════════════════════════════════════════════════ */
        
        /* 渐变流动效果 */
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* 文字发光动画 */
        @keyframes text-glow {
            0%, 100% { text-shadow: 0 0 8px rgba(102, 126, 234, 0.4); }
            50% { text-shadow: 0 0 20px rgba(102, 126, 234, 0.7), 0 0 30px rgba(102, 126, 234, 0.4); }
        }
        
        /* 球体呼吸 */
        @keyframes ball-breath {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* 按压反馈 */
        @keyframes neumorph-press {
            0% { box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); }
            50% { box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); }
            100% { box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); }
        }
        
        /* ════════════════════════════════════════════════════════
           入场动画
        ════════════════════════════════════════════════════════ */
        @keyframes slide-in-up {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes bounce-in {
            0% { opacity: 0; transform: scale(0.85) translateY(20px); }
            40% { opacity: 1; transform: scale(1.02) translateY(-5px); }
            70% { transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        body {
            font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #e0e5ec 0%, #d1d9e6 50%, #c9d1de 100%);
            background-size: 200% 200%;
            animation: gradient-shift 15s ease infinite;
            min-height: 100vh;
            color: var(--text-primary);
        }
        
        /* 网格背景 - 柔和风格 */
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 24px 16px 140px 16px;
            position: relative;
            z-index: 10;
        }
        
        /* ════════════════════════════════════════════════════════
           Header - Pure Neumorphism
        ════════════════════════════════════════════════════════ */
        .header {
            text-align: center;
            padding: 32px 24px 28px;
            background: var(--bg-light);
            border-radius: 24px;
            margin-bottom: 20px;
            box-shadow: 
                15px 15px 30px var(--shadow-dark),
                -15px -15px 30px var(--shadow-light);
            animation: slide-in-up 0.6s ease-out;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
            letter-spacing: 2px;
            animation: text-glow 3s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        
        .header p {
            font-size: 15px;
            color: var(--text-secondary);
            opacity: 0.85;
            text-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }
        
        /* 赛博卡片 */
        .card {
            background: linear-gradient(
                145deg,
                rgba(15, 23, 42, 0.6),
                rgba(30, 41, 59, 0.6)
            );
            backdrop-filter: blur(24px) saturate(160%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                0 0 40px rgba(138, 43, 226, 0.1);
            border: 1px solid rgba(138, 43, 226, 0.3);
            position: relative;
            overflow: hidden;
            animation: slide-in-up 0.5s ease-out;
            animation-fill-mode: both;
        }
        
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }
        
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(138, 43, 226, 0.05),
                transparent
            );
            animation: card-shimmer 6s ease-in-out infinite;
        }
        
        @keyframes card-shimmer {
            0%, 100% { left: -100%; }
            50% { left: 100%; }
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }
        
        .badge {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.6), rgba(59, 130, 246, 0.6));
            color: #fff;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(138, 43, 226, 0.5);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
        }
        
        /* 按钮 - 霓虹辉光 */
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.6), rgba(59, 130, 246, 0.6));
            color: #fff;
            border: 1px solid rgba(138, 43, 226, 0.5);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.6), 0 4px 12px rgba(0, 0, 0, 0.4);
        }
        
        .action-btn:active { transform: translateY(0); }
        
        .action-btn.secondary {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.5), rgba(14, 165, 233, 0.5));
            border-color: rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }
        
        .action-btn.done {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.7), rgba(16, 185, 129, 0.7));
            border-color: rgba(34, 197, 94, 0.6);
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.5);
        }
        
        /* 号码球 - 霓虹球体 */
        .ball-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        
        .ball {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 17px;
            color: #fff;
            box-shadow: 
                0 8px 24px rgba(0, 0, 0, 0.4),
                inset 0 4px 8px rgba(255, 255, 255, 0.3),
                0 0 30px currentColor;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .ball.red {
            background: linear-gradient(145deg, #ef4444, #dc2626);
            color: #ffffff;
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.4), inset 0 4px 8px rgba(255, 255, 255, 0.3);
        }
        
        .ball.blue {
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            color: #ffffff;
            width: 48px; height: 48px;
            font-size: 18px;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4), inset 0 4px 8px rgba(255, 255, 255, 0.3);
        }
        
        .ball.matched {
            animation: matched-glow 0.6s ease-out;
            box-shadow: 
                0 0 50px rgba(251, 191, 36, 0.9),
                0 0 100px rgba(251, 191, 36, 0.6),
                inset 0 4px 8px rgba(255, 255, 255, 0.6);
            border: 3px solid #fbbf24;
            z-index: 10;
            transform: scale(1.2);
        }
        
        @keyframes matched-glow {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1.2); }
        }
        
        /* 信息行 */
        .info-row {
            font-size: 14px;
            color: rgba(224, 230, 237, 0.85);
            margin-top: 14px;
            padding: 16px;
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.7), rgba(30, 41, 59, 0.7));
            backdrop-filter: blur(12px);
            border-radius: 14px;
            line-height: 2;
            border: 1px solid rgba(138, 43, 226, 0.3);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .info-row b { color: #38bdf8; font-size: 15px; }
        
        /* ════════════════════════════════════════════════════════
           期号选择器 - Neumorphism
        ════════════════════════════════════════════════════════ */
        .issue-selector {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
            box-shadow: 
                8px 8px 16px var(--neumorph-dark),
                -8px -8px 16px var(--neumorph-light);
        }
        
        .issue-selector:hover {
            transform: translateY(-2px);
            box-shadow: 
                10px 10px 20px var(--neumorph-dark),
                -10px -10px 20px var(--neumorph-light),
                0 0 20px rgba(102, 126, 234, 0.2);
        }
        
        .issue-selector:active {
            box-shadow: 
                inset 4px 4px 8px var(--neumorph-dark),
                inset -4px -4px 8px var(--neumorph-light);
        }
        
        .issue-label {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.05em;
        }
        
        .issue-value {
            font-size: 17px;
            font-weight: 700;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(102, 126, 234, 0.4);
        }
        
        .issue-selector-arrow { font-size: 12px; color: var(--text-secondary); opacity: 0.7; }

        /* ════════════════════════════════════════════════════════
           弹窗系统 - Glassmorphism
        ════════════════════════════════════════════════════════ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(232, 223, 245, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.show { display: flex; }
        
        .modal-box {
            background: var(--glass-bg);
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 75vh;
            overflow: hidden;
            box-shadow: 
                0 30px 80px rgba(31, 38, 135, 0.2),
                0 0 60px rgba(102, 126, 234, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            border: 1px solid var(--glass-border);
            animation: modal-slide 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translateY(0);
        }
        
        @keyframes modal-slide {
            from { opacity: 0; transform: translateY(50px) scale(0.85); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.15);
            font-weight: 700;
            font-size: 17px;
            background: linear-gradient(180deg, rgba(102, 126, 234, 0.1), transparent);
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
        }
        
        .modal-close {
            font-size: 32px;
            color: var(--text-secondary);
            cursor: pointer;
            line-height: 1;
            margin-left: 10px;
            transition: all 0.2s;
            font-weight: 300;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .modal-close:hover { 
            color: var(--accent-color); 
            transform: rotate(90deg) scale(1.1);
            background: rgba(102, 126, 234, 0.1);
            text-shadow: 0 0 15px var(--glow-color);
        }
        
        .modal-scroll { max-height: calc(75vh - 90px); overflow-y: auto; }
        
        .modal-item {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .modal-item:last-child {
            border-bottom: none;
        }
        
        .modal-item:hover {
            background: linear-gradient(145deg, rgba(102, 126, 234, 0.08), rgba(102, 126, 234, 0.03));
            transform: translateX(4px);
            box-shadow: inset 2px 0 8px rgba(102, 126, 234, 0.1);
        }
        
        .modal-item:active {
            background: rgba(102, 126, 234, 0.12);
            transform: translateX(2px) scale(0.98);
        }
        
        /* 滚动条美化 */
        .modal-scroll::-webkit-scrollbar {
            width: 6px;
        }
        
        .modal-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .modal-scroll::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 3px;
        }
        
        .modal-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.5);
        }
        
        /* ════════════════════════════════════════════════════════
           核验结果区 - Glassmorphism
        ════════════════════════════════════════════════════════ */
        #resultsSection { display: none; }
        
        .result-summary-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706);
            border-radius: 18px;
            margin-top: 16px;
            box-shadow: 
                0 10px 35px rgba(251, 191, 36, 0.5),
                inset 0 2px 0 rgba(255, 255, 255, 0.3),
                0 0 50px rgba(251, 191, 36, 0.3);
            animation: result-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        /* 金色流光效果 */
        .result-summary-bar::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        @keyframes result-pop {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            50% { transform: scale(1.05) translateY(-5px); }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        
        .result-summary-left {}
        
        .result-summary-title { 
            font-size: 13px; 
            color: var(--text-secondary); 
            margin-bottom: 3px; 
            font-weight: 600; 
            letter-spacing: 0.05em;
        }
        
        .result-summary-amount { 
            font-size: 36px; 
            font-weight: 900; 
            color: #e11d48; 
            line-height: 1; 
            text-shadow: 0 2px 8px rgba(225, 29, 72, 0.2);
        }
        
        .result-summary-sub { 
            font-size: 12px; 
            color: var(--text-secondary); 
            margin-top: 5px; 
        }
        
        .result-no-win {
            text-align: center;
            padding: 24px 20px;
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: 
                8px 8px 16px var(--neumorph-dark),
                -8px -8px 16px var(--neumorph-light);
        }
        
        /* 详情弹窗中奖条目 */
        .detail-win-item {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 
                8px 8px 16px var(--neumorph-dark),
                -8px -8px 16px var(--neumorph-light);
        }
        
        .detail-win-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .detail-win-index { font-size: 13px; color: var(--text-secondary); opacity: 0.7; }
        
        .level-badge {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 800;
            box-shadow: 0 3px 12px rgba(251, 191, 36, 0.4);
            letter-spacing: 0.05em;
            text-shadow: none;
        }
        
        .detail-win-balls { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
        
        .detail-mini-ball { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2); }
        .detail-mini-ball.red { background: linear-gradient(145deg, #ef4444, #dc2626); }
        .detail-mini-ball.blue { background: linear-gradient(145deg, #3b82f6, #2563eb); }
        .detail-mini-ball.matched { border: 3px solid #fbbf24; transform: scale(1.25); box-shadow: 0 5px 16px rgba(251, 191, 36, 0.6); }
        
        .detail-win-info { font-size: 13px; color: var(--text-primary); line-height: 1.9; }
        .detail-win-amount { font-size: 18px; font-weight: 800; color: #e11d48; margin-top: 10px; text-shadow: 0 0 15px rgba(225, 29, 72, 0.3); }
        
        /* 最近 3 期迷你列表 */
        .recent-area { 
            margin-top: 18px; 
            padding-top: 16px; 
            border-top: 1px solid rgba(102, 126, 234, 0.15); 
        }
        
        .mini-recent-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 12px 16px; 
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .mini-recent-item:hover {
            background: linear-gradient(145deg, rgba(102, 126, 234, 0.05), rgba(102, 126, 234, 0.02));
            transform: translateX(4px);
        }
        
        .mini-recent-item:last-child { 
            border-bottom: none; 
        }
        
        .mini-recent-info { 
            font-size: 12px; 
            color: var(--text-secondary); 
            min-width: 80px;
            opacity: 0.8;
        }
        
        .mini-recent-balls { display: flex; gap: 5px; flex-wrap: wrap; }
        
        .mini-recent-ball { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff; box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2); }
        .mini-recent-ball.red { background: linear-gradient(145deg, #ef4444, #dc2626); }
        .mini-recent-ball.blue { background: linear-gradient(145deg, #3b82f6, #2563eb); }

        /* ════════════════════════════════════════════════════════
           底部固定栏 & Toast 提示
        ════════════════════════════════════════════════════════ */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(180deg, rgba(10, 14, 39, 0.95), rgba(10, 14, 39, 1));
            backdrop-filter: blur(24px) saturate(160%);
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            padding: 16px 18px;
            z-index: 9900;  /* 降低底部栏层级，让期号选择弹窗可以浮在其上 */
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        }
        
        .btn-check {
            background: linear-gradient(135deg, #00ffff, #06b6d4);
            color: #0a0e27;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            box-shadow: 
                0 10px 40px rgba(0, 255, 255, 0.5),
                inset 0 2px 0 rgba(255, 255, 255, 0.3),
                0 0 60px rgba(6, 182, 212, 0.4);
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-check::before {
            content: '';
            position: absolute;
            top: 0; left: -200%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.8s ease;
        }
        
        .btn-check:hover::before { left: 200%; }
        
        .btn-check:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 50px rgba(0, 255, 255, 0.6),
                inset 0 2px 0 rgba(255, 255, 255, 0.4),
                0 0 80px rgba(6, 182, 212, 0.5);
        }
        
        .btn-check:active { transform: translateY(1px); }
        
        .toast {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(24px) saturate(160%);
            color: #e0e6ed;
            padding: 18px 32px;
            border-radius: 18px;
            font-size: 15px;
            z-index: 10001;
            display: none;
            max-width: 85%;
            text-align: center;
            pointer-events: none;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 
                0 15px 50px rgba(0, 0, 0, 0.7),
                0 0 60px rgba(0, 255, 255, 0.3);
        }
        
        .toast.show {
            display: block;
            animation: toast-pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes toast-pop {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .hidden { display: none; }

        /* ════════════════════════════════════════════════════════
           我的号码折叠卡片 & Tabs 切换
        ════════════════════════════════════════════════════════ */
        .my-nums-header { display: flex; align-items: center; justify-content: space-between; }
        .my-nums-title-wrap { display: flex; align-items: center; gap: 10px; }
        .nums-preview { margin-top: 12px; }
        .nums-chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
        
        .num-chip {
            background: linear-gradient(145deg, rgba(138, 43, 226, 0.3), rgba(92, 33, 174, 0.3));
            border: 1px solid rgba(138, 43, 226, 0.5);
            border-radius: 24px;
            padding: 6px 14px;
            font-size: 12px;
            color: #e0e6ed;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(138, 43, 226, 0.3);
            transition: all 0.3s ease;
        }
        
        .num-chip:hover {
            border-color: rgba(0, 255, 255, 0.7);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 255, 255, 0.4);
        }
        
        /* 折叠动画 */
        .my-nums-collapse {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            margin-top: 0;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease, margin-top 0.35s ease;
        }
        
        .my-nums-collapse.open {
            max-height: 1600px;
            opacity: 1;
            margin-top: 18px;
        }
        
        /* 号码文本框 - 等宽字体 */
        .tickets-textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px 18px;
            border: 1px solid rgba(138, 43, 226, 0.4);
            border-radius: 16px;
            font-size: 13px;
            line-height: 2;
            resize: none;
            background: linear-gradient(145deg, rgba(138, 43, 226, 0.2), rgba(92, 33, 174, 0.2));
            color: #e0e6ed;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 12px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        
        .tickets-textarea:focus {
            outline: none;
            border-color: rgba(0, 255, 255, 0.7);
            box-shadow: 
                inset 0 2px 8px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(138, 43, 226, 0.4);
        }
        
        /* Tabs 标签页 - 赛博风格 */
        .tabs-header { display: flex; border-bottom: 2px solid rgba(138, 43, 226, 0.4); margin-bottom: 16px; }
        
        .tab-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            color: rgba(224, 230, 237, 0.6);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .tab-btn.active {
            color: #a855f7;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #a855f7, transparent);
            border-radius: 2px;
            animation: shimmer 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
        }
        
        .tab-btn:hover { color: rgba(224, 230, 237, 0.9); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 输入区域 - 全息卡片 */
        .input-area {
            padding: 18px;
            background: linear-gradient(145deg, rgba(138, 43, 226, 0.15), rgba(92, 33, 174, 0.15));
            border-radius: 18px;
            border: 1px solid rgba(138, 43, 226, 0.4);
            backdrop-filter: blur(12px);
        }
        
        .input-label { font-size: 13px; color: rgba(224, 230, 237, 0.8); margin-bottom: 10px; display: block; letter-spacing: 0.05em; }
        
        .text-input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid rgba(138, 43, 226, 0.4);
            border-radius: 16px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            margin-bottom: 10px;
            background: linear-gradient(145deg, rgba(138, 43, 226, 0.15), rgba(92, 33, 174, 0.15));
            color: #e0e6ed;
            transition: all 0.3s ease;
        }
        
        .text-input:focus {
            border-color: rgba(0, 255, 255, 0.7);
            box-shadow: 
                0 0 0 4px rgba(138, 43, 226, 0.15),
                inset 0 2px 8px rgba(0, 0, 0, 0.2),
                0 0 40px rgba(138, 43, 226, 0.4);
        }
        
        /* 图片上传区域 - 光效边框 */
        .upload-zone {
            padding: 32px;
            background: linear-gradient(145deg, rgba(138, 43, 226, 0.1), rgba(92, 33, 174, 0.1));
            border: 2px dashed rgba(138, 43, 226, 0.5);
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 14px;
        }
        
        .upload-zone:hover {
            background: linear-gradient(145deg, rgba(138, 43, 226, 0.15), rgba(92, 33, 174, 0.15));
            border-color: rgba(0, 255, 255, 0.7);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.3);
        }
        
        .upload-icon-big { font-size: 44px; margin-bottom: 12px; filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.4)); }
        .upload-hint { font-size: 14px; color: rgba(224, 230, 237, 0.7); letter-spacing: 0.05em; }
        
        .selected-files { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
        
        .file-item {
            position: relative;
            width: 88px;
            height: 88px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(138, 43, 226, 0.4);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
        }
        
        .file-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .file-remove {
            position: absolute;
            top: 6px; right: 6px;
            width: 26px; height: 26px;
            background: linear-gradient(145deg, #ef4444, #dc2626);
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 3px 10px rgba(239, 68, 68, 0.5);
            transition: all 0.3s ease;
        }
        
        .file-remove:hover { transform: scale(1.15); box-shadow: 0 5px 16px rgba(239, 68, 68, 0.7); }
        
        /* AI 识别结果框 */
        .analyze-result-box {
            background: linear-gradient(145deg, rgba(34, 197, 94, 0.2), rgba(16, 185, 129, 0.2));
            padding: 15px 18px;
            border-radius: 16px;
            margin-top: 12px;
            border-left: 4px solid #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.4);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        .analyze-result-box.error {
            background: linear-gradient(145deg, rgba(239, 68, 68, 0.2), rgba(220, 38, 38, 0.2));
            border-left-color: #ef4444;
            border-color: rgba(239, 68, 68, 0.4);
        }
        
        .analyze-result-box .ar-label { font-size: 13px; color: rgba(224, 230, 237, 0.8); margin-bottom: 5px; }
        .analyze-result-box .ar-nums { font-size: 17px; font-weight: 800; color: #e0e6ed; letter-spacing: 0.1em; }
        
        .divider { border: none; border-top: 1px dashed rgba(138, 43, 226, 0.4); margin: 18px 0; }
    </style>
</head>
<body>

<div class="container">

    <!-- 标题 -->
    <div class="header">
        <h1>🎱 双色球查询工具</h1>
        <p>双色球开奖查询 · 自动核验</p>
    </div>

    <!-- ══ 核验结果区 ══ -->
    <div id="resultsSection" class="card">
        <div class="card-title">
            <span>✅ 核验结果 &nbsp;<span id="matchCount" style="color:#667eea">0</span> 注中奖</span>
            <button class="action-btn" onclick="showDetailModal()">
                <span class="btn-icon">📋</span>详情
            </button>
        </div>
        <!-- 中奖汇总 / 未中奖提示 -->
        <div id="summaryArea"></div>
    </div>

    <!-- 详情弹窗 -->
    <div id="detailModal" class="modal-overlay" onclick="closeDetailModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span>🎉 中奖详情</span>
                <span class="modal-close" onclick="closeDetailModal()">×</span>
            </div>
            <div id="detailModalContent" class="modal-scroll" style="padding:14px"></div>
        </div>
    </div>

    <!-- ══ 开奖号码 ══ -->
    <div class="card">
        <div class="card-title">
            <span>📊 最新开奖</span>
            <button id="fetchBtn" class="action-btn" onclick="fetchLatest()">
                <span class="btn-icon">🔄</span>刷新
            </button>
        </div>

        <div id="issueSelector" class="issue-selector" onclick="showIssueModal()">
            <span id="currentIssueText">── 选择期号 ──</span>
            <span class="issue-selector-arrow">▼</span>
        </div>

        <!-- 期号弹窗 -->
        <div id="issueModal" class="modal-overlay" onclick="closeIssueModal(event)">
            <div class="modal-box" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <span>选择期号</span>
                    <span class="modal-close" onclick="closeIssueModal()">×</span>
                </div>
                <div id="issueModalList" class="modal-scroll"></div>
            </div>
        </div>

        <div id="latestInfo" class="info-row hidden"></div>
        <div id="latestBalls" class="ball-row hidden"></div>

        <div id="recent3Area" class="recent-area hidden">
            <div style="font-size:12px;color:#a0aec0;margin-bottom:6px">最近 3 期开奖</div>
            <div id="recent3List"></div>
        </div>
    </div>

    <!-- ══ 我的号码（折叠卡片）══ -->
    <div class="card">
        <!-- 头部：标题 + badge + 编辑按钮 -->
        <div class="my-nums-header">
            <div class="my-nums-title-wrap">
                <span style="font-size:15px;font-weight:600">🎫 我的号码</span>
                <span class="badge" id="ticketCount">15</span>
            </div>
            <button id="editToggleBtn" class="action-btn" onclick="toggleMyNumbers()">
                <span class="btn-icon" id="editBtnIcon">✏️</span>
                <span id="editBtnText">编辑</span>
            </button>
        </div>

        <!-- 收起状态：号码 chip 概览 -->
        <div class="nums-preview" id="numsPreview">
            <div class="nums-chips-wrap" id="numsChips"></div>
        </div>

        <!-- 展开区域 -->
        <div class="my-nums-collapse" id="myNumsCollapse">
            <textarea id="ticketsDisplay" class="tickets-textarea" readonly></textarea>
            <hr class="divider">

            <!-- Tabs -->
            <div class="tabs-header">
                <button class="tab-btn active" id="tabBtnManual" onclick="switchTab('manual',this)">✍️ 手写号码</button>
                <button class="tab-btn" id="tabBtnUpload" onclick="switchTab('upload',this)">📷 图片识别</button>
            </div>

            <!-- Tab: 手写 -->
            <div id="tabManual" class="tab-content active">
                <div class="input-area">
                    <label class="input-label">输入开奖号码（用于手动核验）</label>
                    <input type="text" id="manualInput" class="text-input" placeholder="例如：01 05 09 14 19 33+12">
                    <button class="action-btn secondary" style="width:100%;justify-content:center" onclick="setManualLottery()">
                        <span class="btn-icon">✅</span>确认设置开奖号
                    </button>
                </div>
            </div>

            <!-- Tab: 图片识别 -->
            <div id="tabUpload" class="tab-content">
                <div class="input-area">
                    <label class="input-label">上传彩票截图，AI 自动识别号码</label>
                    <input type="file" id="imageInput" accept="image/*" multiple onchange="handleImageSelect(event)" style="display:none">
                    <div class="upload-zone" onclick="document.getElementById('imageInput').click()">
                        <div class="upload-icon-big">📸</div>
                        <div class="upload-hint">点击上传图片 (jpg / png)</div>
                    </div>
                    <div id="selectedFiles" class="selected-files"></div>
                    <button id="analyzeBtn" class="action-btn" style="width:100%;justify-content:center" onclick="analyzeImages()">
                        <span class="btn-icon">🤖</span>AI 识别号码
                    </button>
                    <div id="analyzeResult" class="hidden analyze-result-box" style="margin-top:8px"></div>
                </div>
            </div>
        </div><!-- /collapse -->
    </div>

</div><!-- /container -->

<!-- 底部核验按钮 -->
<div class="bottom-bar">
    <button class="btn-check" onclick="checkTickets()">🎯 一键核验</button>
</div>

<div id="toast" class="toast"></div>

<script>
// ─── 你的 15 注号码 ───────────────────────────────────────────
const YOUR_TICKETS = [
    "01 05 09 14 19 33 12",
    "01 06 09 14 22 29 01",
    "01 08 14 17 22 27 12",
    "01 09 14 18 22 30 16",
    "01 09 12 14 24 32 16",
    "02 06 14 18 22 29 15",
    "03 08 12 21 26 33 10",
    "03 09 14 20 28 32 10",
    "05 06 13 14 19 22 15",
    "05 06 13 19 22 30 07",
    "06 08 14 21 22 27 07",
    "06 10 13 22 28 31 01",
    "07 08 09 18 26 31 12",
    "10 16 20 24 26 30 05",
    "11 14 18 22 27 31 09"
];

const API_BASE = 'https://api.huiniao.top/interface/home/lotteryHistory';
let latest = null, historyList = [], selectedImages = [], winningDetails = [];
let lastFetchTime = 0, COOLDOWN = 30000;
let isEditOpen = false;

// ─── DOM ───────────────────────────────────────────────────────
const lotteryInfoEl    = document.getElementById('latestInfo');
const latestBallsEl    = document.getElementById('latestBalls');
const ticketsDisplayEl = document.getElementById('ticketsDisplay');
const matchCountEl     = document.getElementById('matchCount');
const summaryArea      = document.getElementById('summaryArea');
const toastEl          = document.getElementById('toast');
const fetchBtn         = document.getElementById('fetchBtn');
const recent3Area      = document.getElementById('recent3Area');
const recent3List      = document.getElementById('recent3List');
const currentIssueText = document.getElementById('currentIssueText');
const issueModal       = document.getElementById('issueModal');
const issueModalList   = document.getElementById('issueModalList');
const detailModal      = document.getElementById('detailModal');
const detailModalContent = document.getElementById('detailModalContent');
const analyzeBtn       = document.getElementById('analyzeBtn');
const analyzeResultDiv = document.getElementById('analyzeResult');
const selectedFilesDiv = document.getElementById('selectedFiles');
const imageInput       = document.getElementById('imageInput');
const resultsSection   = document.getElementById('resultsSection');

// ─── 初始化 ────────────────────────────────────────────────────
(function init(){
    ticketsDisplayEl.value = YOUR_TICKETS.join('\n');
    document.getElementById('ticketCount').textContent = YOUR_TICKETS.length;
    renderChips();

    const cached = localStorage.getItem('ssq_latest_v2');
    if(cached){ latest = JSON.parse(cached); showLatest(latest); fetchHistoryList(); }
    else { setTimeout(fetchLatest, 500); }

    // 默认收起结果区，但保留DOM
    resultsSection.style.display = 'none';
    showToast('已加载 ' + YOUR_TICKETS.length + ' 注号码 ✓');
})();

// ─── 我的号码 折叠控制 ─────────────────────────────────────────
function toggleMyNumbers(){
    isEditOpen = !isEditOpen;
    const collapse = document.getElementById('myNumsCollapse');
    const preview  = document.getElementById('numsPreview');
    const icon     = document.getElementById('editBtnIcon');
    const text     = document.getElementById('editBtnText');
    const btn      = document.getElementById('editToggleBtn');

    if(isEditOpen){
        collapse.classList.add('open');
        preview.style.display  = 'none';
        icon.textContent = '✅';
        text.textContent = '完成';
        btn.classList.add('done');
        btn.classList.remove('action-btn');
        btn.className = 'action-btn done';
    } else {
        collapse.classList.remove('open');
        preview.style.display  = 'block';
        icon.textContent = '✏️';
        text.textContent = '编辑';
        btn.className = 'action-btn';
    }
}

// 渲染号码 chips
function renderChips(){
    const wrap = document.getElementById('numsChips');
    wrap.innerHTML = '';
    YOUR_TICKETS.forEach(raw => {
        const nums = raw.trim().split(/\s+/);
        if(nums.length < 7) return;
        const reds = nums.slice(0,6).map(n => n.padStart(2,'0')).join(' ');
        const blue = nums[6].padStart(2,'0');
        const chip = document.createElement('span');
        chip.className = 'num-chip';
        chip.textContent = `${reds} +${blue}`;
        wrap.appendChild(chip);
    });
}

// ─── Tab 切换 ──────────────────────────────────────────────────
function switchTab(name, btnEl){
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btnEl.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
}

// ─── 期号弹窗 ──────────────────────────────────────────────────
function showIssueModal(){
    if(!historyList.length){ showToast('请先刷新获取期号'); return; }
    issueModalList.innerHTML = '';
    historyList.slice(0,8).forEach(item => {
        const div = document.createElement('div');
        div.className = 'modal-item' + (latest && latest.issue === item.lottery_no ? ' active' : '');
        div.innerHTML = `<div class="modal-item-title">${item.lottery_no} 期</div><div class="modal-item-sub">${item.lottery_date}</div>`;
        div.onclick = () => selectIssue(item.lottery_no);
        issueModalList.appendChild(div);
    });
    issueModal.classList.add('show');
}
function closeIssueModal(e){ if(e && e.target !== e.currentTarget) return; issueModal.classList.remove('show'); }

function selectIssue(no){
    loadSelectedIssue(no);
    currentIssueText.textContent = no + '期';
    closeIssueModal();
    showToast('✓ 已切换到 ' + no + ' 期');
}

// ─── 详情弹窗 ──────────────────────────────────────────────────
function showDetailModal(){
    if(!winningDetails.length){ showToast('暂无中奖详情'); return; }

    const totalWin = winningDetails.reduce((s,i) => s + (i.baseAmount||0), 0);
    const totalTax = winningDetails.reduce((s,i) => s + (i.tax||0), 0);

    let html = `
        <div style="background:linear-gradient(135deg,#ffeaa7,#fdcb6e);border-radius:10px;padding:14px;margin-bottom:14px;text-align:center">
            <div style="font-size:12px;color:#8a5e00;margin-bottom:2px">${latest ? latest.issue + ' 期 · ' + latest.date : ''}</div>
            <div style="font-size:28px;font-weight:700;color:#d35400">${formatMoney(totalWin)}</div>
            ${totalTax > 0 ? `<div style="font-size:11px;color:#a07030;margin-top:2px">税后 ${formatMoney(totalWin - totalTax)}</div>` : ''}
        </div>
        <div style="font-size:13px;font-weight:600;color:#4a5568;margin-bottom:10px">共 ${winningDetails.length} 注中奖明细</div>
    `;

    winningDetails.forEach(item => {
        const ballsHtml = [...item.parsed.reds.map(n =>
            `<div class="detail-mini-ball red ${latest.reds.includes(n) ? 'matched' : ''}">${n < 10 ? '0'+n : n}</div>`
        ), `<div class="detail-mini-ball blue ${latest.blue === item.parsed.blue ? 'matched' : ''}">${item.parsed.blue < 10 ? '0'+item.parsed.blue : item.parsed.blue}</div>`].join('');

        html += `
            <div class="detail-win-item">
                <div class="detail-win-header">
                    <span class="detail-win-index">第 ${item.index} 注</span>
                    <span class="level-badge">${item.level}</span>
                </div>
                <div class="detail-win-balls">${ballsHtml}</div>
                <div class="detail-win-info">
                    红球命中 <strong style="color:#e53e3e">${item.hitRed}/6</strong>
                    &nbsp;·&nbsp; 蓝球 ${item.hitBlue ? '<span style="color:#48bb78">✔</span>' : '<span>✘</span>'}
                </div>
                ${item.baseAmount ? `<div class="detail-win-amount">${formatMoney(item.baseAmount)}${item.tax ? `<span style="font-size:11px;color:#a0aec0"> (税后 ${formatMoney(item.baseAmount - item.tax)})</span>` : ''}</div>` : ''}
            </div>
        `;
    });

    detailModalContent.innerHTML = html;
    detailModal.classList.add('show');
}
function closeDetailModal(e){ if(e && e.target !== e.currentTarget) return; detailModal.classList.remove('show'); }

// ─── 获取最新开奖 ──────────────────────────────────────────────
async function fetchLatest(){
    const now = Date.now();
    if(now - lastFetchTime < COOLDOWN){
        showToast(`冷却中，还需等待 ${Math.ceil((COOLDOWN-(now-lastFetchTime))/1000)} 秒`);
        return;
    }
    fetchBtn.disabled = true;
    fetchBtn.classList.add('loading');
    fetchBtn.innerHTML = '<span class="btn-icon">⏳</span>获取中';

    try {
        const res = await fetch(`${API_BASE}?type=ssq&page=1&limit=8`, { headers:{'Accept':'application/json'} });
        if(!res.ok) throw new Error('网络请求失败');
        const data = await res.json();
        if(data.code === 1 && data.data){
            const list = data.data.data && data.data.data.list ? data.data.data.list : [];
            if(!list.length) throw new Error('返回数据为空');

            historyList = list.map(i => ({
                lottery_no: i.code, lottery_date: i.day,
                lottery_res: `${i.one},${i.two},${i.three},${i.four},${i.five},${i.six},${i.seven}`
            }));

            const l = list[0];
            latest = { date:l.day, issue:l.code, reds:[+l.one,+l.two,+l.three,+l.four,+l.five,+l.six], blue:+l.seven, timestamp:Date.now() };
            showLatest(latest); saveCache(); lastFetchTime = Date.now();
            showToast('✓ 开奖号码已更新');
        } else { throw new Error(data.info || '数据格式错误'); }
    } catch(e){
        showToast('刷新失败：' + e.message);
    } finally {
        fetchBtn.disabled = false;
        fetchBtn.classList.remove('loading');
        fetchBtn.innerHTML = '<span class="btn-icon">🔄</span>刷新';
    }
}

async function fetchHistoryList(){
    try {
        const res = await fetch(`${API_BASE}?type=ssq&page=1&limit=10`, { headers:{'Accept':'application/json'} });
        if(!res.ok) return;
        const data = await res.json();
        const list = data.data && data.data.data && data.data.data.list ? data.data.data.list : [];
        if(list.length) historyList = list.map(i => ({
            lottery_no: i.code, lottery_date: i.day,
            lottery_res: `${i.one},${i.two},${i.three},${i.four},${i.five},${i.six},${i.seven}`
        }));
    } catch(e){ console.warn('historyList fetch error', e); }
}

function loadSelectedIssue(no){
    const item = historyList.find(h => h.lottery_no === no);
    if(!item) return;
    const p = parseLotteryRes(item.lottery_res);
    latest = { date:item.lottery_date, issue:item.lottery_no, reds:p.reds, blue:p.blue, timestamp:Date.now() };
    showLatest(latest); saveCache();
}

function parseLotteryRes(s){
    if(!s) return { reds:[], blue:null };
    const nums = s.split(',').map(Number);
    if(nums.length === 7) return { reds:nums.slice(0,6), blue:nums[6] };
    const p = s.split('@');
    return { reds:p[0].split(',').map(Number), blue:p[1] ? +p[1].split(',')[0] : null };
}

function showLatest(d){
    lotteryInfoEl.innerHTML = `<div><b>期号：</b>${d.issue}</div><div><b>开奖日期：</b>${d.date}</div>`;
    renderBalls(d.reds, d.blue, latestBallsEl);
    lotteryInfoEl.classList.remove('hidden');
    latestBallsEl.classList.remove('hidden');
    currentIssueText.textContent = d.issue + ' 期';
}

function renderBalls(reds, blue, el){
    el.innerHTML = '';
    reds.forEach(n => el.appendChild(mkBall(n,'red')));
    if(blue != null) el.appendChild(mkBall(blue,'blue'));
}
function mkBall(n, type){
    const b = document.createElement('div');
    b.className = `ball ${type}`;
    b.textContent = n < 10 ? '0'+n : n;
    return b;
}

// ─── 手动设置开奖号 ────────────────────────────────────────────
function setManualLottery(){
    const val = document.getElementById('manualInput').value.trim();
    if(!val){ showToast('请输入号码'); return; }
    const p = parseNumber(val);
    if(!p){ showToast('格式错误，示例：01 05 09 14 19 33+12'); return; }
    latest = { date:new Date().toLocaleDateString(), issue:'手动', reds:p.reds, blue:p.blue, timestamp:Date.now() };
    showLatest(latest); saveCache(); showToast('✓ 开奖号已设置');
}

function parseNumber(str){
    if(!str) return null;
    str = str.replace(/，/g,',').trim();
    let reds=[], blue=null;
    if(str.includes('+')){
        const p=str.split('+'); reds=p[0].split(/[ ,]+/).filter(Boolean).map(Number); blue=+p[1];
    } else {
        const nums=str.split(/[ ,]+/).filter(Boolean).map(Number);
        if(nums.length===7){ reds=nums.slice(0,6); blue=nums[6]; }
    }
    if(reds.length!==6||isNaN(blue)) return null;
    if(reds.some(n=>isNaN(n)||n<1||n>33)) return null;
    if(blue<1||blue>16) return null;
    return {reds,blue};
}

function saveCache(){ if(latest) localStorage.setItem('ssq_latest_v2', JSON.stringify(latest)); }

// ─── 图片处理 ──────────────────────────────────────────────────
function handleImageSelect(e){
    Array.from(e.target.files).forEach(file => {
        if(!file.type.startsWith('image/')) return;
        const r = new FileReader();
        r.onload = ev => { selectedImages.push({file, dataUrl:ev.target.result}); renderFileList(); };
        r.readAsDataURL(file);
    });
    imageInput.value = '';
}
function renderFileList(){
    selectedFilesDiv.innerHTML = '';
    selectedImages.forEach((img,i) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `<img src="${img.dataUrl}"><button class="file-remove" onclick="removeImg(${i})">×</button>`;
        selectedFilesDiv.appendChild(div);
    });
}
function removeImg(i){ selectedImages.splice(i,1); renderFileList(); }

async function analyzeImages(){
    if(!selectedImages.length){ showToast('请先上传图片'); return; }
    analyzeBtn.disabled = true;
    analyzeBtn.classList.add('loading');
    analyzeBtn.innerHTML = '<span class="btn-icon">⏳</span>识别中…';
    analyzeResultDiv.className = 'analyze-result-box hidden';
    try {
        await new Promise(r => setTimeout(r, 1800));
        const mock = genMock();
        analyzeResultDiv.innerHTML = `<div class="ar-label">🤖 AI 识别结果</div><div class="ar-nums">${mock.reds.map(n=>String(n).padStart(2,'0')).join(' ')} + ${String(mock.blue).padStart(2,'0')}</div>`;
        analyzeResultDiv.classList.remove('hidden');
        latest = { date:new Date().toLocaleDateString(), issue:'图片识别', reds:mock.reds, blue:mock.blue, timestamp:Date.now() };
        showLatest(latest); saveCache(); showToast('✓ 识别完成');
    } catch(e){
        analyzeResultDiv.className = 'analyze-result-box error';
        analyzeResultDiv.innerHTML = `<div class="ar-label">❌ 识别失败</div><div>${e.message}</div>`;
        analyzeResultDiv.classList.remove('hidden');
    } finally {
        analyzeBtn.disabled = false; analyzeBtn.classList.remove('loading');
        analyzeBtn.innerHTML = '<span class="btn-icon">🤖</span>AI 识别号码';
    }
}
function genMock(){
    const r=[]; while(r.length<6){ const n=~~(Math.random()*33)+1; if(!r.includes(n))r.push(n); }
    return { reds:r.sort((a,b)=>a-b), blue:~~(Math.random()*16)+1 };
}

// ─── 中奖判断 ──────────────────────────────────────────────────
function checkWin(t){
    const hr=t.reds.filter(n=>latest.reds.includes(n)).length, hb=t.blue===latest.blue;
    let level=null, base=0;
    if(hr===6&&hb)          { level='一等奖'; }
    else if(hr===6)          { level='二等奖'; }
    else if(hr===5&&hb)      { level='三等奖'; base=3000; }
    else if(hr===5||hr===4&&hb){ level='四等奖'; base=200; }
    else if(hr===4||hr===3&&hb){ level='五等奖'; base=10; }
    else if(hr===3)          { level='福运奖'; base=5; }  // 新增：中 3 个红球，固定奖金 5 元
    else if(hb)              { level='六等奖'; base=5; }
    let tax=0;
    if(base>10000){ tax=Math.round(base*.2); }
    return { hitRed:hr, hitBlue:hb, level, baseAmount:base, tax };
}

// ─── 一键核验 ──────────────────────────────────────────────────
function checkTickets(){
    if(!latest){ showToast('请先获取开奖号码'); return; }

    resultsSection.style.display = 'block';
    winningDetails = [];
    let winCount = 0, totalAmt = 0;

    YOUR_TICKETS.forEach((raw, idx) => {
        const p = parseNumber(raw);
        if(!p) return;
        const w = checkWin(p);
        if(w.level){
            winCount++;
            totalAmt += w.baseAmount || 0;
            winningDetails.push({ ...w, index:idx+1, raw, parsed:p });
        }
    });

    matchCountEl.textContent = winCount;

    // ── 汇总区（只显示总金额）──
    if(winCount > 0){
        const totalTax = winningDetails.reduce((s,i)=>s+(i.tax||0),0);
        summaryArea.innerHTML = `
            <div class="result-summary-bar">
                <div class="result-summary-left">
                    <div class="result-summary-title">🎉 恭喜！共 ${winCount} 注中奖</div>
                    <div class="result-summary-amount">${formatMoney(totalAmt)}</div>
                    ${totalTax > 0 ? `<div class="result-summary-sub">税后 ${formatMoney(totalAmt - totalTax)}</div>` : ''}
                </div>
                <div style="font-size:36px;opacity:.35">🏆</div>
            </div>
        `;
    } else {
        summaryArea.innerHTML = `
            <div class="result-no-win">😅 本期 15 注均未中奖，继续加油！</div>
        `;
    }

    resultsSection.scrollIntoView({ behavior:'smooth' });
}

// ─── 工具函数 ──────────────────────────────────────────────────
function formatMoney(n){ return n == null ? '¥0' : '¥' + Number(n).toLocaleString(); }

function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2000);
}

document.addEventListener('keydown', e => { if(e.key==='F12'){ e.preventDefault(); checkTickets(); } });
</script>
<script>
// ════════════════════════════════════════════════════════
// 翠竹禅境 · 动态背景系统

(function initDynamicBackground() {
    // 创建竹林背景
    const bambooBg = document.createElement('div');
    bambooBg.className = 'bamboo-bg';
    const bambooCount = 25;

    for (let i = 0; i < bambooCount; i++) {
        const bamboo = document.createElement('div');
        bamboo.className = 'bamboo';
        const height = 180 + Math.random() * 250;
        const width = 14 + Math.random() * 10;
        const left = (i / bambooCount) * 100 + (Math.random() - 0.5) * 5;
        const delay = Math.random() * 10;
        const nodes = Math.floor(height / 35);

        bamboo.style.height = `${height}px`;
        bamboo.style.width = `${width}px`;
        bamboo.style.left = `${left}%`;
        bamboo.style.animationDelay = `${delay}s`;
        bamboo.style.animationDuration = `${8 + Math.random() * 6}s`;

        // 竹节渐变
        let gradientColors = [];
        for (let j = 0; j <= nodes; j++) {
            gradientColors.push(j === 0 || j === nodes ? '#1a4a1a' : '#2d6a2d');
        }
        gradientColors.push('#1a4a1a');
        bamboo.style.background = `linear-gradient(to bottom, ${gradientColors.join(', ')})`;

        bambooBg.appendChild(bamboo);
    }
    document.body.insertBefore(bambooBg, document.body.firstChild);

    // 创建飘落竹叶
    const createLeaf = () => {
        const leaf = document.createElement('div');
        leaf.className = 'leaf';
        const size = 8 + Math.random() * 10;
        const left = Math.random() * 100;
        const duration = 12 + Math.random() * 15;
        const delay = Math.random() * 20;
        const rotateSpeed = (Math.random() - 0.5) * 360;

        leaf.style.width = `${size}px`;
        leaf.style.height = `${size * 0.7}px`;
        leaf.style.left = `${left}%`;
        leaf.style.top = `-5vh`;
        leaf.style.opacity = '0';
        leaf.style.fontSize = `${rotateSpeed}deg/s`;

        bambooBg.appendChild(leaf);

        let opacity = 0;
        const fall = setInterval(() => {
            opacity += 0.02;
            if (opacity > 0.9) opacity = 0.9;
            leaf.style.opacity = opacity;
            leaf.style.top = (parseFloat(leaf.style.top) || -5) + 0.5 + 'vh';
            leaf.style.transform = `rotate(${parseFloat(leaf.dataset.rotate || 0)}deg)`;
            leaf.dataset.rotate = (parseFloat(leaf.dataset.rotate) || 0) + 2;

            if (parseFloat(leaf.style.top) >= '110vh') {
                clearInterval(fall);
                leaf.remove();
            }
        }, 30);
    };

    setInterval(createLeaf, 800);

    // 创建粒子光效
    const particles = document.createElement('div');
    particles.className = 'particles';
    const particleCount = 35;

    for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const left = Math.random() * 100;
        const duration = 18 + Math.random() * 20;
        const delay = Math.random() * 25;

        particle.style.left = `${left}%`;
        particle.style.animationDuration = `${duration}s`;
        particle.style.animationDelay = `${delay}s`;

        particles.appendChild(particle);
    }
    document.body.insertBefore(particles, document.body.firstChild);
})();
